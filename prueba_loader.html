<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loader MD3 - Tamaño y Tiempo Ajustados</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">

    <script type="importmap">
        {
          "imports": {
            "@material/web/": "https://esm.run/@material/web/"
          }
        }
    </script>
    <script type="module">
        import '@material/web/all.js';
    </script>

    <style>
        /* Variables de tu tema actual */
        :root {
            --md-sys-color-surface: #1C1B1F;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-primary: #D0BCFF; /* Color sólido, sin transparencia */
            --md-sys-color-secondary-container: #4A4458; 
        }

        body {
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Fondo sólido oscuro, ya no es semi-transparente */
            background-color: var(--md-sys-color-surface);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 1; /* Transparencia eliminada (era 0.95) */
        }

        .md3-loader-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            /* --- AJUSTE DE TAMAÑO DEL CÍRCULO DE FONDO --- */
            width: 140px;  /* Antes era 90px */
            height: 140px; /* Antes era 90px */
            background-color: var(--md-sys-color-secondary-container); 
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.4); /* Un toque de sombra para resaltar */
        }

        #loader-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Texto un poco más grande para acompañar el nuevo tamaño */
        .texto-carga {
            margin-top: 24px; 
            font-size: 1.2rem;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <h2 style="margin-bottom: 24px;">Loader MD3 Nativo (Versión Grande)</h2>
    
    <md-filled-button id="btn-probar">
        Simular Carga a BD (8 Segundos)
        <md-icon slot="icon">data_usage</md-icon>
    </md-filled-button>

    <div id="pantalla-carga" class="loader-overlay" style="display: none;">
        <div class="md3-loader-container">
            <canvas id="loader-canvas"></canvas>
        </div>
        <p class="texto-carga">Sincronizando inventarios...</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnProbar = document.getElementById('btn-probar');
            const pantallaCarga = document.getElementById('pantalla-carga');
            const canvas = document.getElementById('loader-canvas');
            const ctx = canvas.getContext('2d');

            let raf = null;
            let t = 0;

            const SHAPES = [
                { sides: 4, maxAmp: 0.18 },  // Cuadrado redondeado
                { sides: 10, maxAmp: 0.12 }, // Wavy Star (10 puntas)
                { sides: 2, maxAmp: 0.25 },  // Óvalo
                { sides: 6, maxAmp: 0.15 }   // Hexágono
            ];

            let shapeIndex = 0;
            let currentSides = SHAPES[0].sides;
            let targetAmp = SHAPES[0].maxAmp;
            let morphPhase = 0;
            let lastCycle = -1;

            // --- AJUSTE DE TAMAÑO DEL VECTOR ---
            const radius = 46; // Radio base de la figura (Antes era 28)
            
            const morphSpeed = 0.03; 
            const rotSpeed = 0.04;   
            let rotation = 0;

            const style = getComputedStyle(document.body);
            const colorPrimario = style.getPropertyValue('--md-sys-color-primary').trim() || '#D0BCFF';

            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);
            }

            function loop() {
                t++;
                const w = canvas.parentElement.clientWidth;
                const h = canvas.parentElement.clientHeight;
                const cx = w / 2;
                const cy = h / 2;

                ctx.clearRect(0, 0, w, h);

                rotation += rotSpeed;
                morphPhase += morphSpeed;
                const currentCycle = Math.floor(morphPhase / Math.PI);

                if (currentCycle !== lastCycle) {
                    lastCycle = currentCycle;
                    shapeIndex = (shapeIndex + 1) % SHAPES.length;
                    currentSides = SHAPES[shapeIndex].sides;
                    targetAmp = SHAPES[shapeIndex].maxAmp;
                }

                const currentAmplitude = Math.abs(Math.sin(morphPhase)) * targetAmp;

                ctx.beginPath();
                const resolution = 200; // Resolución aumentada para el nuevo tamaño

                for (let i = 0; i <= resolution; i++) {
                    const theta = (i / resolution) * Math.PI * 2;
                    const r = radius * (1 + currentAmplitude * Math.cos(currentSides * (theta + rotation)));

                    const px = cx + Math.cos(theta) * r;
                    const py = cy + Math.sin(theta) * r;

                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }

                ctx.closePath();
                ctx.fillStyle = colorPrimario;
                ctx.fill();

                raf = requestAnimationFrame(loop);
            }

            btnProbar.addEventListener('click', () => {
                pantallaCarga.style.display = 'flex';
                resizeCanvas();
                loop(); 
                
                // --- AJUSTE DE TIEMPO ---
                setTimeout(() => {
                    pantallaCarga.style.display = 'none';
                    cancelAnimationFrame(raf); 
                }, 8000); // 8000 milisegundos = 8 segundos de animación
            });

            window.addEventListener('resize', resizeCanvas);
        });
    </script>
</body>

</html>
